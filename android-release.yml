name: Android CI/CD - Build & Release APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]           # وقتی تگ v1.0.0 بزنی، release اتوماتیک می‌سازه
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode debug keystore (برای بیلد debug)
        run: |
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" > debug.keystore.base64
          base64 -d debug.keystore.base64 > debug.keystore

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK (برای تست PRها)
        if: github.event_name == 'pull_request'
        run: ./gradlew assembleDebug

      - name: Build Release APK
        if: github.event_name != 'pull_request'
        env:
          KEYSTORE_PATH: ${{ secrets.KEYSTORE_PATH }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: A-APK
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      # ==================== فقط برای تگ‌ها Release بساز ====================
      - name: Create Release & Upload APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
